# Exposure Reservation Service Configuration
spring.application.name=exposure-reservation-service
server.port=8080


# Logging
logging.level.edu.yu.marketmaker.exposurereservation=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# High-availability config
ha.zookeeper.connect=${HA_ZOOKEEPER_CONNECT:zookeeper:2181}
ha.service.name=exposure-reservation
ha.advertise.host=${HOSTNAME:localhost}

# RSocket server (TCP) for MessageMapping routes — Exchange's ReservationRequester
# calls exposure-reservation via RSocket on this port.
spring.rsocket.server.port=7000
