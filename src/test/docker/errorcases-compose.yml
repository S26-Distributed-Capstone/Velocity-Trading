# Single-instance stack for the errorcases.local error-case tests.
#
# docs/error-cases.md describes single services failing ("Exchange goes
# down", "Trading state service goes down"). The production compose.yml is
# a 3-replica HA stack behind a load balancer, where stopping one replica
# is routed around — so it cannot reproduce the documented outages without
# killing whole tiers. This file runs exactly one of each service so a
# single `docker compose stop <service>` is a real outage.
#
# Driven by ErrorsITSupport via `docker compose -f src/test/docker/errorcases-compose.yml`.
# Build contexts are relative to this file's directory, hence ../../.. .
#
# Host port map (consumed by ErrorsITSupport):
#   trading-state        18080
#   exchange             18081
#   exposure-reservation 18082
#   external-publisher   18083

services:
  zookeeper:
    image: zookeeper:3.9
    hostname: zookeeper
    environment:
      # Standalone single-node ensemble — enough for HA leader election
      # with one replica of each service.
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok,mntr,stat,conf
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=marketmaker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketmaker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # trading-state, exchange and exposure-reservation form one Hazelcast
  # cluster (one member per role). Each advertises its own service name.
  trading-state:
    image: market-maker
    build: ../../..
    hostname: trading-state
    environment:
      - SPRING_PROFILES_ACTIVE=trading-state
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
      - HA_ADVERTISE_HOST=trading-state
      - HAZELCAST_MEMBERS=trading-state,exchange,exposure-reservation
    ports:
      - "18080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      zookeeper: { condition: service_healthy }

  exposure-reservation:
    image: market-maker
    build: ../../..
    hostname: exposure-reservation
    environment:
      - SPRING_PROFILES_ACTIVE=exposure-reservation
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
      - HA_ADVERTISE_HOST=exposure-reservation
      - HAZELCAST_MEMBERS=trading-state,exchange,exposure-reservation
    ports:
      - "18082:8080"
    depends_on:
      postgres: { condition: service_healthy }
      zookeeper: { condition: service_healthy }

  exchange:
    image: market-maker
    build: ../../..
    hostname: exchange
    environment:
      - SPRING_PROFILES_ACTIVE=exchange
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
      - HA_ADVERTISE_HOST=exchange
      - HAZELCAST_MEMBERS=trading-state,exchange,exposure-reservation
    ports:
      - "18081:8080"
    depends_on:
      postgres: { condition: service_healthy }
      zookeeper: { condition: service_healthy }

  external-publisher:
    image: market-maker
    build: ../../..
    hostname: external-publisher
    environment:
      - SPRING_PROFILES_ACTIVE=external-publisher
      - EXCHANGE_BASE_URL=http://exchange:8080
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
    ports:
      - "18083:8080"
    depends_on:
      postgres: { condition: service_healthy }
      exchange: { condition: service_started }
