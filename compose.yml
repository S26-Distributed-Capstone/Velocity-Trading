services:
  trading-state:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=trading-state
    image: market-maker
    ports:
      - "18080:8080"
      - "7000:7000"
    depends_on:
      postgres:
        condition: service_healthy
  postgres:  # <--- THIS IS THE SERVICE NAME
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=marketmaker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketmaker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  zookeeper1:
    image: zookeeper:3.9
    hostname: zookeeper1
    environment:
      - ZOO_MY_ID=1
      - ZOO_SERVERS=server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok,mntr,stat,conf
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  zookeeper2:
    image: zookeeper:3.9
    hostname: zookeeper2
    environment:
      - ZOO_MY_ID=2
      - ZOO_SERVERS=server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok,mntr,stat,conf
    ports:
      - "2182:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  zookeeper3:
    image: zookeeper:3.9
    hostname: zookeeper3
    environment:
      - ZOO_MY_ID=3
      - ZOO_SERVERS=server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok,mntr,stat,conf
    ports:
      - "2183:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  market-maker-node-1:
    image: market-maker
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=market-maker-node,test-quote-generator
      - ZOOKEEPER_CONNECT=zookeeper1:2181,zookeeper2:2181,zookeeper3:2181
      - CLUSTER_ADVERTISE_HOST=market-maker-node-1
    ports:
      - "8081:8080"
    volumes:
      - ./config/symbols.txt:/config/symbols.txt:ro
    depends_on:
      zookeeper1:
        condition: service_healthy
      zookeeper2:
        condition: service_healthy
      zookeeper3:
        condition: service_healthy
      postgres:
        condition: service_healthy

