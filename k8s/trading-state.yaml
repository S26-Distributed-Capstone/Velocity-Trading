apiVersion: v1
kind: Service
metadata:
  name: trading-state
  namespace: market-maker
spec:
  selector:
    app: trading-state
  ports:
    - { name: http,    port: 8080, targetPort: 8080 }
    - { name: rsocket, port: 7000, targetPort: 7000 }
    - { name: hz,      port: 5701, targetPort: 5701 }
---
# NodePort for the integration test to reach trading-state HTTP from outside.
apiVersion: v1
kind: Service
metadata:
  name: trading-state-np
  namespace: market-maker
spec:
  type: NodePort
  selector:
    app: trading-state
  ports:
    - { name: http, port: 8080, targetPort: 8080, nodePort: 30180 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-state
  namespace: market-maker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-state
  template:
    metadata:
      labels:
        app: trading-state
    spec:
      containers:
        - name: app
          image: market-maker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080 }
            - { containerPort: 7000 }
            - { containerPort: 5701 }
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: trading-state
            - name: HAZELCAST_MEMBERS
              valueFrom:
                configMapKeyRef:
                  name: hazelcast-members
                  key: members
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 10