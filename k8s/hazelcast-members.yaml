# Single source of truth for the Hazelcast TCP-IP member list.
# All pods join one cluster; absent members are tolerated as in compose.
# In-namespace short DNS names resolve via cluster DNS; mm-N.mm-hs entries
# point at individual market-maker pods through the headless service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hazelcast-members
  namespace: market-maker
data:
  members: "trading-state,exchange,exposure-reservation,external-publisher,mm-0.mm-hs,mm-1.mm-hs,mm-2.mm-hs,mm-3.mm-hs,mm-4.mm-hs,mm-5.mm-hs,mm-6.mm-hs"