apiVersion: v1
kind: Service
metadata:
  name: external-publisher
  namespace: market-maker
spec:
  selector:
    app: external-publisher
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: hz,   port: 5701, targetPort: 5701 }
---
apiVersion: v1
kind: Service
metadata:
  name: external-publisher-np
  namespace: market-maker
spec:
  type: NodePort
  selector:
    app: external-publisher
  ports:
    - { name: http, port: 8080, targetPort: 8080, nodePort: 30183 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-publisher
  namespace: market-maker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-publisher
  template:
    metadata:
      labels:
        app: external-publisher
    spec:
      containers:
        - name: app
          image: market-maker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080 }
            - { containerPort: 5701 }
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: external-publisher
            - name: EXCHANGE_BASE_URL
              value: http://exchange:8080
            - name: HAZELCAST_MEMBERS
              valueFrom:
                configMapKeyRef:
                  name: hazelcast-members
                  key: members
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 10