# Headless service: gives each MM pod stable DNS mm-N.mm-hs for Hazelcast and
# leader->worker forward connections.
apiVersion: v1
kind: Service
metadata:
  name: mm-hs
  namespace: market-maker
spec:
  clusterIP: None
  # Peers resolve mm-N.mm-hs for Hazelcast and leader->worker forward
  # connections during bootstrap, before any pod is Ready. Without this,
  # DNS would never publish and the cluster could never form.
  publishNotReadyAddresses: true
  selector:
    app: mm
  ports:
    - { name: http,    port: 8080 }
    - { name: forward, port: 7001 }
    - { name: hz,      port: 5701 }
---
# Per-pod NodePort services so the integration test can address mm-0..mm-6
# on stable host ports (mirrors the compose 8081..8087 mapping).
apiVersion: v1
kind: Service
metadata:
  name: mm-0-np
  namespace: market-maker
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: mm-0
  ports: [{ name: http, port: 8080, targetPort: 8080, nodePort: 30081 }]
---
