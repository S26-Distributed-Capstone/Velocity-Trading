---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mm
  namespace: market-maker
spec:
  serviceName: mm-hs
  replicas: 7
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: mm
  template:
    metadata:
      labels:
        app: mm
    spec:
      affinity:
        # Spread MM pods across cluster nodes when possible (best-effort).
        # Honors the symbol-sharding rule: each ticker on exactly one MM node.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mm
                topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: market-maker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080 }
            - { containerPort: 7001 }
            - { containerPort: 5701 }
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SPRING_PROFILES_ACTIVE
              # Override to production-quote-generator for the end-to-end test.
              value: "market-maker-node,test-quote-generator"
            - name: ZOOKEEPER_CONNECT
              value: "zk-0.zk-hs:2181,zk-1.zk-hs:2181,zk-2.zk-hs:2181"
            # Pod-stable DNS used by peers to open the leader->worker forward.
            - name: CLUSTER_ADVERTISE_HOST
              value: "$(POD_NAME).mm-hs.market-maker.svc.cluster.local"
            - name: HAZELCAST_MEMBERS
              valueFrom:
                configMapKeyRef:
                  name: hazelcast-members
                  key: members
          volumeMounts:
            - name: symbols
              mountPath: /config
              readOnly: true
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 25
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 90
            periodSeconds: 10
      volumes:
        - name: symbols
          configMap:
            name: symbols
            items:
              - key: symbols.txt
                path: symbols.txt